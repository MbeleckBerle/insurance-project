services:
  backend:
    build: .
    container_name: insurance-backend
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port ${BACKEND_PORT} --reload
    develop:
      watch:
        - action: rebuild
          path: backend-fastapi
          target: backend
          ignore: backend-fastapi/.venv

    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
